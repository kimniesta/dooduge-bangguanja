<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방관자를 잡아라!</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Comic Sans MS", "Jua", "Arial Rounded MT Bold", "Malgun Gothic", Arial, sans-serif;
      color: #263238;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.78), transparent 28%),
        linear-gradient(180deg, #9bd8ff 0%, #c8f0a2 42%, #74b75a 100%);
      padding: 18px;
      user-select: none;
      touch-action: manipulation;
    }

    .game {
      width: min(100%, 430px);
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-family: "Comic Sans MS", "Jua", "Arial Rounded MT Bold", "Malgun Gothic", Arial, sans-serif;
      font-size: clamp(36px, 9vw, 52px);
      line-height: 1.1;
      color: #ffcf33;
      text-shadow:
        2px 2px 0 #233f23,
        -2px 2px 0 #233f23,
        2px -2px 0 #233f23,
        -2px -2px 0 #233f23,
        0 6px 0 #ff7b54,
        0 10px 14px rgba(35, 63, 35, 0.28);
      letter-spacing: 0;
      transform: rotate(-1.5deg);
    }

    .brush-title {
      display: inline-block;
      font-family: "Nanum Brush Script", "Gungsuh", "궁서", "Batang", serif;
      font-size: 1.12em;
      font-weight: 900;
      color: #ff5a3d;
      transform: rotate(-8deg) translateY(2px);
      transform-origin: center bottom;
      text-shadow:
        2px 2px 0 #233f23,
        -2px 2px 0 #233f23,
        2px -2px 0 #233f23,
        -2px -2px 0 #233f23,
        0 5px 0 #ffd23f,
        0 9px 12px rgba(35, 63, 35, 0.24);
    }

    .status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .status-box {
      border: 3px solid #315331;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 10px 8px;
      box-shadow: 0 5px 0 rgba(49, 83, 49, 0.24);
    }

    .label {
      display: block;
      margin-bottom: 3px;
      font-size: 13px;
      font-weight: 700;
      color: #527052;
    }

    .value {
      display: block;
      font-size: 28px;
      font-weight: 900;
      color: #203b20;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 3vw, 16px);
      width: min(100%, 390px);
      margin: 0 auto 16px;
      padding: clamp(12px, 4vw, 18px);
      border: 4px solid #2f8f52;
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 255, 255, 0.62), transparent 24%),
        radial-gradient(circle at 86% 8%, rgba(255, 245, 128, 0.5), transparent 22%),
        linear-gradient(135deg, #a7f36d 0%, #60d978 43%, #37c59d 100%);
      box-shadow:
        inset 0 3px 0 rgba(255, 255, 255, 0.42),
        inset 0 -5px 0 rgba(30, 116, 61, 0.26),
        0 10px 0 #247647,
        0 18px 28px rgba(30, 54, 26, 0.24);
    }

    .hole {
      position: relative;
      aspect-ratio: 1;
      border: 0;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(ellipse at center, #17120d 0%, #2a1b11 47%, #4a2e18 65%, #7a4f24 100%);
      box-shadow:
        inset 0 8px 8px rgba(0, 0, 0, 0.55),
        0 5px 0 rgba(255, 255, 255, 0.18);
      cursor: pointer;
      touch-action: manipulation;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: 8%;
      height: 22%;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .nose {
      display: none;
    }

    .hole::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 18%;
      width: 58%;
      height: 58%;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 16%, transparent 17%),
        conic-gradient(from 10deg, #ffeb3b, #ff6b4a, #ffffff, #ffeb3b, #ff6b4a, #ffffff, #ffeb3b);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .hole.up .mole {
      bottom: 5%;
    }

    .hole.fake-left .mole,
    .hole.fake-right .mole {
      bottom: -96%;
      transition: none;
      opacity: 0.9;
    }

    .hole.fake-left .mole {
      animation: fakeLeft 0.52s ease-in-out both;
    }

    .hole.fake-right .mole {
      animation: fakeRight 0.52s ease-in-out both;
    }

    .hole.fake-reset .mole {
      animation: none;
      bottom: -96%;
      opacity: 1;
      transform: translateX(-50%);
      transition: none;
    }

    .hole.hit .mole {
      animation: bonk 0.24s ease both;
      filter: drop-shadow(0 7px 3px rgba(0, 0, 0, 0.28)) saturate(1.35) brightness(1.08);
    }

    .hole.hit::before {
      animation: impact 0.24s ease-out both;
    }

    @keyframes bonk {
      0% { transform: translateX(-50%) scale(1) rotate(0deg); }
      35% { transform: translateX(-50%) scale(0.82, 0.72) rotate(-9deg); }
      70% { transform: translateX(-50%) scale(1.06, 0.94) rotate(7deg); }
      100% { transform: translateX(-50%) scale(0.9) rotate(0deg); }
    }

    @keyframes impact {
      0% { opacity: 0.95; transform: translate(-50%, -50%) scale(0.15) rotate(0deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.15) rotate(35deg); }
    }

    @keyframes fakeLeft {
      0%, 100% { transform: translate(-150%, -112%) scale(0.88); }
      46%, 64% { transform: translate(-88%, -112%) scale(0.88); }
    }

    @keyframes fakeRight {
      0%, 100% { transform: translate(50%, -112%) scale(0.88); }
      46%, 64% { transform: translate(-4%, -112%) scale(0.88); }
    }

    .start-btn {
      width: min(100%, 260px);
      border: 0;
      border-radius: 8px;
      padding: 15px 18px;
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      background: #e64b3c;
      box-shadow: 0 6px 0 #a42c23, 0 12px 22px rgba(85, 35, 23, 0.28);
      cursor: pointer;
    }

    .start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #a42c23, 0 8px 18px rgba(85, 35, 23, 0.26);
    }

    .start-btn:disabled {
      color: #f4f4f4;
      background: #7b8a7a;
      box-shadow: 0 6px 0 #566555;
      cursor: default;
    }

    .message {
      min-height: 24px;
      margin: 14px 0 0;
      font-size: 16px;
      font-weight: 800;
      color: #234026;
    }

    .result-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(22, 45, 24, 0.42);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.18s ease, visibility 0.18s ease;
      z-index: 10;
    }

    .result-modal.show {
      opacity: 1;
      visibility: visible;
    }

    .result-box {
      width: min(100%, 330px);
      border: 4px solid #284824;
      border-radius: 8px;
      background: #fff7d7;
      padding: 22px 18px 18px;
      text-align: center;
      box-shadow: 0 10px 0 #c17a31, 0 18px 28px rgba(0, 0, 0, 0.25);
      transform: translateY(12px) scale(0.96);
      transition: transform 0.18s ease;
    }

    .result-modal.show .result-box {
      transform: translateY(0) scale(1);
    }

    .result-title {
      margin: 0 0 8px;
      font-size: 30px;
      color: #ff6d3a;
      text-shadow: 2px 2px 0 #284824;
    }

    .result-score {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 900;
      color: #284824;
    }

    .result-message {
      margin: 0 0 18px;
      font-size: 21px;
      font-weight: 900;
      color: #4d2b19;
      line-height: 1.35;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-btn {
      border: 0;
      border-radius: 8px;
      padding: 12px 10px;
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      background: #6b8f43;
      box-shadow: 0 4px 0 #45632c;
      cursor: pointer;
    }

    .modal-btn.restart {
      background: #e64b3c;
      box-shadow: 0 4px 0 #a42c23;
    }

    @media (max-width: 360px) {
      body {
        padding: 12px;
      }

      .value {
        font-size: 24px;
      }

      .start-btn {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="방관자를 잡아라 게임">
    <h1><span class="brush-title">방관자</span>를 잡아라!</h1>

    <section class="status" aria-label="게임 상태">
      <div class="status-box">
        <span class="label">점수</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="status-box">
        <span class="label">남은 시간</span>
        <span class="value"><span id="time">30</span>초</span>
      </div>
    </section>

    <section class="board" id="board" aria-label="두더지 구멍">
      <button class="hole" type="button" aria-label="1번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="2번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="3번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="4번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="5번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="6번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="7번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="8번 구멍"><span class="mole"><span class="nose"></span></span></button>
      <button class="hole" type="button" aria-label="9번 구멍"><span class="mole"><span class="nose"></span></span></button>
    </section>

    <button class="start-btn" id="startBtn" type="button">시작</button>
    <p class="message" id="message">시작 버튼을 누르면 30초 게임이 시작돼요.</p>
  </main>

  <div class="result-modal" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result-box">
      <h2 class="result-title" id="resultTitle">결과 발표!</h2>
      <p class="result-score" id="resultScore">0점</p>
      <p class="result-message" id="resultMessage">더 노력해주세요^^</p>
      <div class="result-actions">
        <button class="modal-btn" id="closeModalBtn" type="button">닫기</button>
        <button class="modal-btn restart" id="restartModalBtn" type="button">다시 시작</button>
      </div>
    </div>
  </div>

  <script>
    const holes = Array.from(document.querySelectorAll(".hole"));
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const startBtn = document.getElementById("startBtn");
    const messageEl = document.getElementById("message");
    const resultModal = document.getElementById("resultModal");
    const resultScore = document.getElementById("resultScore");
    const resultMessage = document.getElementById("resultMessage");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const restartModalBtn = document.getElementById("restartModalBtn");

    let score = 0;
    let timeLeft = 30;
    let gameTimer = null;
    let moleTimer = null;
    let fakeTimer = null;
    let fakeHideTimer = null;
    let startDelayTimer = null;
    let currentHole = null;
    let currentFakeHoles = [];
    let isPlaying = false;
    let canScore = false;
    let audioContext = null;

    function randomHole() {
      const availableHoles = holes.filter((hole) => hole !== currentHole && !currentFakeHoles.includes(hole));

      return availableHoles[Math.floor(Math.random() * availableHoles.length)] || null;
    }

    function prepareAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) {
        return null;
      }

      if (!audioContext) {
        audioContext = new AudioContext();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      return audioContext;
    }

    function playTone(context, start, duration, frequency, type, volume) {
      const osc = context.createOscillator();
      const gain = context.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.012);
      gain.gain.setValueAtTime(volume, start + duration * 0.55);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      gain.connect(context.destination);

      osc.start(start);
      osc.stop(start + duration + 0.03);
    }

    function playCorrectSound() {
      const context = prepareAudio();
      if (!context) {
        return;
      }

      const now = context.currentTime;
      playTone(context, now, 0.13, 880, "sine", 0.7);
      playTone(context, now + 0.13, 0.18, 1175, "sine", 0.76);
    }

    function playWrongSound() {
      const context = prepareAudio();
      if (!context) {
        return;
      }

      const now = audioContext.currentTime;
      playTone(context, now, 0.1, 220, "square", 0.64);
      playTone(context, now + 0.12, 0.14, 180, "square", 0.68);
    }

    function hideMole() {
      holes.forEach((hole) => {
        hole.classList.remove("up", "hit");
      });
      currentHole = null;
      canScore = false;
    }

    function hideFakeMole() {
      const fakeHoles = holes.filter((hole) => hole.classList.contains("fake-left") || hole.classList.contains("fake-right"));

      fakeHoles.forEach((hole) => {
        hole.classList.add("fake-reset");
        hole.classList.remove("fake-left", "fake-right");
      });

      requestAnimationFrame(() => {
        fakeHoles.forEach((hole) => {
          hole.classList.remove("fake-reset");
        });
      });

      currentFakeHoles = [];
    }

    function randomFakeHoles(count) {
      const availableHoles = holes.filter((hole) => hole !== currentHole);
      const selectedHoles = [];

      while (selectedHoles.length < count && availableHoles.length > 0) {
        const randomIndex = Math.floor(Math.random() * availableHoles.length);
        selectedHoles.push(availableHoles.splice(randomIndex, 1)[0]);
      }

      return selectedHoles;
    }

    function showFakeMole() {
      clearTimeout(fakeHideTimer);
      hideFakeMole();

      if (!isPlaying) {
        return;
      }

      const fakeCount = timeLeft <= 10 ? 2 : 1;
      currentFakeHoles = randomFakeHoles(fakeCount);
      currentFakeHoles.forEach((hole) => {
        const sideClass = Math.random() < 0.5 ? "fake-left" : "fake-right";
        hole.classList.add(sideClass);
      });

      fakeHideTimer = setTimeout(hideFakeMole, 540);
      fakeTimer = setTimeout(showFakeMole, 1725 + Math.random() * 1550);
    }

    function showMole() {
      hideMole();

      currentHole = randomHole();
      if (!currentHole) {
        moleTimer = setTimeout(showMole, 120);
        return;
      }

      currentHole.classList.add("up");
      canScore = true;

      const nextDelay = timeLeft <= 10 ? 720 : 900;
      moleTimer = setTimeout(showMole, nextDelay);
    }

    function resultText(finalScore) {
      if (finalScore <= 20) {
        return "더 노력해주세요^^";
      }

      if (finalScore <= 30) {
        return "잘했어요. 짝짝^^";
      }

      return "와우! 고수시네요^^";
    }

    function showResultModal() {
      resultScore.textContent = `${score}점`;
      resultMessage.textContent = resultText(score);
      resultModal.classList.add("show");
    }

    function hideResultModal() {
      resultModal.classList.remove("show");
    }

    function endGame() {
      isPlaying = false;
      clearInterval(gameTimer);
      clearTimeout(moleTimer);
      clearTimeout(fakeTimer);
      clearTimeout(fakeHideTimer);
      clearTimeout(startDelayTimer);
      hideMole();
      hideFakeMole();

      startBtn.disabled = false;
      startBtn.textContent = "다시 시작";
      messageEl.textContent = `끝! 최종 점수는 ${score}점이에요.`;
      showResultModal();
    }

    function startGame() {
      hideResultModal();
      score = 0;
      timeLeft = 30;
      isPlaying = false;

      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      startBtn.disabled = true;
      startBtn.textContent = "준비";
      messageEl.textContent = "준비... 곧 시작해요!";
      hideMole();
      hideFakeMole();

      startDelayTimer = setTimeout(() => {
        isPlaying = true;
        startBtn.textContent = "게임 중";
        messageEl.textContent = "나오면 바로 눌러요!";

        showMole();
        fakeTimer = setTimeout(showFakeMole, 1000 + Math.random() * 1000);

        gameTimer = setInterval(() => {
          timeLeft -= 1;
          timeEl.textContent = timeLeft;

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }, 1000);
    }

    holes.forEach((hole) => {
      hole.addEventListener("pointerdown", () => {
        if (!isPlaying) {
          return;
        }

        if (hole === currentHole && canScore) {
          score += 1;
          canScore = false;
          playCorrectSound();
          hole.classList.add("hit");
          setTimeout(hideMole, 140);
        } else {
          score -= 1;
          playWrongSound();
        }

        scoreEl.textContent = score;
      });
    });

    startBtn.addEventListener("click", startGame);
    closeModalBtn.addEventListener("click", hideResultModal);
    restartModalBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
